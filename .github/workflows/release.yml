name: Release Windows-Exe

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: desktop
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      # electron-updater vergleicht die im Paket eingebettete package.json-
      # Version mit der neuesten latest.yml auf GitHub — ohne diesen Schritt
      # bliebe die Version für immer auf dem zuletzt committeten Stand und
      # kein Update würde je erkannt.
      - name: Set version from tag
        shell: bash
        run: npm version "${GITHUB_REF_NAME#v}" --no-git-tag-version --allow-same-version

      - name: Build Windows targets
        run: npx electron-builder --win --publish never

      - name: Create GitHub release with assets
        shell: bash
        working-directory: .
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            --title "Baustift ${{ github.ref_name }}" \
            --generate-notes \
            "desktop/dist/Baustift-Setup.exe" \
            "desktop/dist/Baustift-Portable.exe" \
            "desktop/dist/latest.yml" \
            "desktop/dist/Baustift-Setup.exe.blockmap"
